<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibek Arise | Premium Light</title>
<!-- Google Font for luxury aesthetic -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* Reset and core alignment across viewports */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    background: #ffffff;
    color: #7200ff;
    padding: 20px;
}

/* Premium smooth light gradient background - Optimized with Hardware Acceleration */
.bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(-45deg, #ffffff, #f5efff, #e6d5ff, #ffffff);
    background-size: 400% 400%;
    animation: bg 16s ease infinite;
    z-index: 1;
    transform: translateZ(0); /* Forces GPU implementation */
}

@keyframes bg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Blur Overlay Gate - Optimized to prevent painting lag */
.blur-overlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.5s;
    will-change: opacity, visibility;
}

/* Button inside the overlay */
.enter-btn {
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 800;
    color: #7200ff;
    background: #ffffff;
    border: 2px solid #7200ff;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(114, 0, 255, 0.12);
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease, color 0.25s ease;
}

.enter-btn:hover {
    color: #ffffff;
    background: #7200ff;
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(114, 0, 255, 0.25);
}

/* Active Hidden State for Overlay */
.blur-overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

/* Highly responsive fluid card container */
.card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 380px;
    padding: 35px 25px;
    border-radius: 30px;
    text-align: center;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 2px solid #7200ff;
    box-shadow: 0 20px 40px rgba(114, 0, 255, 0.06);
    transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
    will-change: transform;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 25px 50px rgba(114, 0, 255, 0.14);
}

/* PFP Container with strict #7200ff boundary */
.pfp {
    width: 110px;
    height: 110px;
    margin: 0 auto;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #7200ff;
    box-shadow: 0 0 20px rgba(114, 0, 255, 0.3);
    transition: transform 0.4s ease;
    background: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card:hover .pfp {
    transform: rotate(4deg) scale(1.04);
}

.pfp img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
}

h1 {
    margin-top: 20px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #7200ff;
}

/* Bio Structure */
.bio {
    margin-top: 15px;
    color: #7200ff;
    font-size: 15px;
    line-height: 1.8;
    font-weight: 600;
}

.bio .intro {
    font-size: 16px;
    color: #7200ff;
    font-weight: 800;
    margin-bottom: 8px;
}

.links {
    margin-top: 25px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* Links customized with responsive scaling */
.links a {
    text-decoration: none;
    color: #7200ff;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 20px;
    border-radius: 16px;
    background: rgba(114, 0, 255, 0.04);
    border: 1px solid rgba(114, 0, 255, 0.2);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.25s ease, color 0.25s ease, background-color 0.25s ease, border-color 0.25s ease;
}

/* Strict #7200ff Icon Fill color */
.links a svg {
    width: 20px;
    height: 20px;
    fill: #7200ff;
    flex-shrink: 0;
    transition: fill 0.25s ease, transform 0.25s ease;
}

/* Premium Inversion Hover State */
.links a:hover {
    transform: translateX(4px);
    color: #ffffff;
    background: #7200ff;
    border-color: #7200ff;
}

.links a:hover svg {
    fill: #ffffff;
    transform: scale(1.05);
}

/* Audio Player Interactive Floating Toggle */
.audio-control {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #ffffff;
    border: 2px solid #7200ff;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(114, 0, 255, 0.15);
    transition: transform 0.2s ease, background-color 0.2s ease;
}

.audio-control:hover {
    transform: scale(1.06);
    background: #7200ff;
}

.audio-control svg {
    width: 18px;
    height: 18px;
    fill: #7200ff;
    transition: fill 0.2s ease;
}

.audio-control:hover svg {
    fill: #ffffff;
}

.footer {
    margin-top: 30px;
    font-size: 11px;
    color: #7200ff;
    opacity: 0.65;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
}

/* Media Query explicitly to balance padding ergonomics */
@media (max-width: 400px) {
    .card {
        padding: 30px 18px;
        border-radius: 24px;
    }
    h1 { font-size: 24px; }
    .bio { font-size: 14px; }
    .links a { padding: 12px 16px; font-size: 14px; }
}
</style>
</head>

<script>
const music = document.getElementById('bg-music');
const toggleBtn = document.getElementById('audio-toggle');
const svgPath = document.getElementById('svg-path');
const gateScreen = document.getElementById('gate-screen');
const enterBtn = document.getElementById('enter-btn');

// Optimized Vector SVG Strings (Pre-calculated without DOM-rebuild stutter)
const playIconPath = "M6 22h12a4 4 0 0 0 4-4V6a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v12a4 4 0 0 0 4 4zm2-14.5A1.5 1.5 0 0 1 9.5 6h5A1.5 1.5 0 0 1 16 7.5v6.17a3 3 0 1 1-2-2.83V9h-3v4.17a3 3 0 1 1-2-2.83V7.5z";
const pauseIconPath = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

function startPlay() {
    music.play().then(() => {
        svgPath.setAttribute('d', pauseIconPath);
    }).catch(err => {
        console.log("Audio process deferred safely.");
    });
}

// Master execution event
enterBtn.addEventListener('click', () => {
    gateScreen.classList.add('hidden');
    startPlay();
});

// Play/Pause Action handling
toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (music.paused) {
        startPlay();
    } else {
        music.pause();
        svgPath.setAttribute('d', playIconPath);
    }
});
</script>
