<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibek Arise | Solo Leveling</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
    :root {
        --purple: #7200ff;
        --purple-dark: #5a00cc;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0a001f, #1a0033, #2a004d);
        color: white;
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    /* Animated Background Orbs */
    .bg-orbs {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
    }

    .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
        animation: float 25s infinite ease-in-out;
    }

    .orb1 { width: 600px; height: 600px; background: var(--purple); top: -10%; left: -10%; animation-delay: 0s; }
    .orb2 { width: 500px; height: 500px; background: #a855f7; bottom: -15%; right: -10%; animation-delay: 8s; }
    .orb3 { width: 400px; height: 400px; background: #c084fc; top: 30%; right: 20%; animation-delay: 15s; }

    @keyframes float {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(60px, 60px); }
    }

    /* Blur Gate */
    .blur-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(10, 0, 31, 0.85);
        backdrop-filter: blur(24px);
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .blur-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    .enter-btn {
        padding: 18px 52px;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: white;
        background: transparent;
        border: 2px solid var(--purple);
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 0 40px rgba(114, 0, 255, 0.4);
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
    }

    .enter-btn::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: 0.6s;
    }

    .enter-btn:hover::before {
        left: 200%;
    }

    .enter-btn:hover {
        transform: scale(1.08) translateY(-4px);
        box-shadow: 0 0 60px rgba(114, 0, 255, 0.7);
        background: rgba(114, 0, 255, 0.1);
    }

    /* Main Card */
    .card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 400px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(114, 0, 255, 0.3);
        border-radius: 32px;
        padding: 40px 30px;
        text-align: center;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .card:hover {
        transform: translateY(-12px);
    }

    .pfp {
        width: 138px;
        height: 138px;
        margin: 0 auto 20px;
        border-radius: 50%;
        overflow: hidden;
        border: 5px solid var(--purple);
        box-shadow: 0 0 0 8px rgba(114, 0, 255, 0.15),
                    0 0 40px rgba(114, 0, 255, 0.4);
        transition: all 0.5s ease;
    }

    .card:hover .pfp {
        transform: scale(1.08) rotate(6deg);
        box-shadow: 0 0 0 12px rgba(114, 0, 255, 0.25),
                    0 0 60px rgba(114, 0, 255, 0.6);
    }

    .pfp img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    h1 {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 8px;
        background: linear-gradient(90deg, #ffffff, #c084fc, #ffffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .subtitle {
        color: #c4b5fd;
        font-size: 15px;
        margin-bottom: 24px;
        font-weight: 500;
    }

    .bio {
        color: #e0d4ff;
        line-height: 1.7;
        font-size: 15.5px;
        margin-bottom: 32px;
    }

    .links {
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .links a {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 20px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(114, 0, 255, 0.2);
        border-radius: 20px;
        color: white;
        text-decoration: none;
        font-weight: 600;
        font-size: 15.5px;
        transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .links a:hover {
        transform: translateX(12px) scale(1.02);
        background: rgba(114, 0, 255, 0.15);
        border-color: var(--purple);
        box-shadow: 0 10px 30px rgba(114, 0, 255, 0.25);
    }

    .links a svg {
        width: 24px;
        height: 24px;
        fill: #c4b5fd;
        transition: all 0.3s ease;
    }

    .links a:hover svg {
        fill: white;
        transform: scale(1.15);
    }

    /* Audio Player */
    .audio-control {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 100;
        width: 58px;
        height: 58px;
        background: rgba(255,255,255,0.1);
        border: 2px solid var(--purple);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 25px rgba(114, 0, 255, 0.3);
        transition: all 0.3s ease;
    }

    .audio-control:hover {
        transform: scale(1.12);
        background: var(--purple);
    }

    .footer {
        margin-top: 40px;
        font-size: 12px;
        opacity: 0.6;
        letter-spacing: 1px;
    }
</style>
</head>

<!-- Audio -->
<audio id="bg-music" loop preload="auto">
    <source src="https://raw.githubusercontent.com/bibekarish/bibek_arish/main/Solo_Leveling_Ringtone___DARK_ARIA_Song_Ringtone___BGM_PR_Tone_MP3_256kbps_128k" type="audio/mp3">
</audio>

<div class="audio-control" id="audio-toggle" title="Toggle Music">
    <svg id="audio-icon" width="28" height="28" viewBox="0 0 24 24" fill="white">
        <path id="svg-path" d="M8 5.14v14l11-7z"/>
    </svg>
</div>

<script>
const music = document.getElementById('bg-music');
const toggleBtn = document.getElementById('audio-toggle');
const svgPath = document.getElementById('svg-path');
const gateScreen = document.getElementById('gate-screen');
const enterBtn = document.getElementById('enter-btn');

const playPath = "M8 5.14v14l11-7z";
const pausePath = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

function playMusic() {
    music.play().catch(() => {});
    svgPath.setAttribute('d', pausePath);
}

enterBtn.addEventListener('click', () => {
    gateScreen.classList.add('hidden');
    playMusic();
});

toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (music.paused) {
        playMusic();
    } else {
        music.pause();
        svgPath.setAttribute('d', playPath);
    }
});
</script>
